# Config for two-layer VideoMME long-duration experiment.
benchmark:
  name: videomme
  parquet_path: /home2/ycj/Datas/VideoMME/videomme/test-00000-of-00001.parquet
  video_dir: /home2/ycj/Datas/VideoMME/videos
  duration_groups: ["long"]
  subtitle_dir: null  # not used for this experiment

paths:
  outputs_root: /home2/ycj/Project/VEIL/outputs

memory:
  cache_dir: /home2/ycj/Project/VEIL/outputs/memory/videomme_L_27B

veil_loop:
  max_iter: 3
  query_history_dedup_threshold: 0.9      # Jaccard, query vs history
  evidence_dedup_threshold: 0.9           # BGE cosine, evidence chunk vs accumulated
  query_evidence_dedup_threshold: 0.7     # BGE cosine, new query vs existing evidence (drift)
  kf_dedup_threshold: 0.92                # SigLIP cosine, keyframe vs keyframe

eval:
  output_dir: /home2/ycj/Project/VEIL/outputs/results/videomme

models:
  vlm:
    model_path: /home2/ycj/Models/Qwen/Qwen3.5-27B
  llm:
    model_path: /home2/ycj/Models/Qwen/Qwen3.5-27B
    dtype: bfloat16
    attn_impl: sdpa
  embedder:
    model_path: /home2/ycj/Models/BAAI/bge-m3
    use_fp16: true

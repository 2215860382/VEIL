# Coverage-first rubric. Evidence requirements are checked before option stance.

general:
  evidence_requirements:
    - id: target_grounding
      description: "Identify the exact person, object, event, or topic referenced by the question and option."
      required: true
      weight: 1.0
      modality: multimodal
      repair_action: refine_query
  decision_policy:
    support_confidence_threshold: 0.80
    refute_confidence_threshold: 0.70
    require_all_options_resolved: true

type_aliases:
  "Action Reasoning": action_reasoning
  "Action Recognition": action_recognition
  "Attribute Perception": attribute_perception
  "Counting Problem": counting
  "Information Synopsis": information_synopsis
  "OCR Problems": ocr
  "Object Reasoning": object_reasoning
  "Object Recognition": object_recognition
  "Spatial Perception": spatial
  "Spatial Reasoning": spatial
  "Temporal Perception": temporal
  "Temporal Reasoning": temporal

templates:
  action_reasoning:
    evidence_requirements:
      - id: action_observation
        description: "Observe or explicitly hear the action attributed to the target actor."
        required: true
        weight: 1.0
        modality: multimodal
        repair_action: dense_sample
      - id: cause_or_motive
        description: "Observe or hear the concrete reason, motive, or consequence connecting the action to the proposed explanation."
        required: true
        weight: 1.0
        modality: dialogue
        repair_action: refine_query
      - id: action_context
        description: "Place the action and its explanation in the scene or time context specified by the question."
        required: true
        weight: 0.8
        modality: temporal
        repair_action: time_sorted

  action_recognition:
    evidence_requirements:
      - id: actor_identity
        description: "Identify the actor or object performing the action."
        required: true
        weight: 0.9
        modality: visual
        repair_action: refine_query
      - id: action_observation
        description: "Directly observe the motion, action, or state change described by the option."
        required: true
        weight: 1.0
        modality: visual
        repair_action: dense_sample
      - id: action_time_scope
        description: "Confirm the action occurs in the time segment or sequence requested by the question."
        required: true
        weight: 0.8
        modality: temporal
        repair_action: time_sorted

  attribute_perception:
    evidence_requirements:
      - id: entity_visibility
        description: "Clearly locate the entity whose attribute is being queried."
        required: true
        weight: 0.9
        modality: visual
        repair_action: refine_query
      - id: attribute_value
        description: "Directly observe or hear the exact attribute value, state, label, or property proposed by the option."
        required: true
        weight: 1.0
        modality: multimodal
        repair_action: dense_sample
      - id: attribute_context
        description: "Confirm the attribute belongs to the correct entity and requested time or scene."
        required: true
        weight: 0.9
        modality: multimodal
        repair_action: refine_query

  counting:
    evidence_requirements:
      - id: count_target
        description: "Identify exactly which objects, people, or events must be counted."
        required: true
        weight: 0.9
        modality: visual
        repair_action: refine_query
      - id: count_scope
        description: "Establish the full temporal or spatial interval over which the count is defined."
        required: true
        weight: 1.0
        modality: temporal
        repair_action: broadcast
      - id: count_instances
        description: "Observe every distinct qualifying instance without omissions or duplicate counting."
        required: true
        weight: 1.0
        modality: visual
        repair_action: dense_sample

  information_synopsis:
    evidence_requirements:
      - id: global_topic_coverage
        description: "Cover the video's beginning, middle, and end sufficiently to identify its dominant topic."
        required: true
        weight: 1.0
        modality: global
        repair_action: broadcast
      - id: recurring_subject
        description: "Identify the subject, event, or argument that recurs across the video."
        required: true
        weight: 1.0
        modality: multimodal
        repair_action: broadcast
      - id: synopsis_specificity
        description: "Recover the specific central claim or activity needed to distinguish the options."
        required: true
        weight: 0.9
        modality: dialogue
        repair_action: refine_query

  ocr:
    evidence_requirements:
      - id: text_region
        description: "Locate the exact frame and text region referenced by the question."
        required: true
        weight: 0.9
        modality: visual
        repair_action: dense_sample
      - id: text_reading
        description: "Read the exact word, number, label, or phrase needed to judge the option."
        required: true
        weight: 1.0
        modality: ocr
        repair_action: dense_sample
      - id: text_context
        description: "Associate the text with the correct object, speaker, scene, or time."
        required: true
        weight: 0.8
        modality: visual
        repair_action: refine_query

  object_reasoning:
    evidence_requirements:
      - id: entity_relation
        description: "Identify the exact entities and the relationship asserted between them."
        required: true
        weight: 1.0
        modality: multimodal
        repair_action: refine_query
      - id: relation_evidence
        description: "Observe or hear the concrete fact that establishes or contradicts the proposed relationship."
        required: true
        weight: 1.0
        modality: multimodal
        repair_action: refine_query
      - id: reasoning_context
        description: "Recover the surrounding context needed to distinguish causal, ownership, identity, or purpose alternatives."
        required: true
        weight: 0.9
        modality: dialogue
        repair_action: refine_query

  object_recognition:
    evidence_requirements:
      - id: object_visibility
        description: "Clearly observe the target object or person in the relevant scene."
        required: true
        weight: 1.0
        modality: visual
        repair_action: dense_sample
      - id: distinguishing_features
        description: "Observe the visual or spoken features that distinguish the proposed identity from the alternatives."
        required: true
        weight: 1.0
        modality: multimodal
        repair_action: refine_query
      - id: object_context
        description: "Confirm the recognized entity appears in the scene or role specified by the question."
        required: true
        weight: 0.8
        modality: multimodal
        repair_action: refine_query

  spatial:
    evidence_requirements:
      - id: spatial_entities
        description: "Simultaneously identify the entities whose relative positions are queried."
        required: true
        weight: 1.0
        modality: visual
        repair_action: dense_sample
      - id: reference_frame
        description: "Establish the viewpoint or reference entity used for left, right, front, behind, or distance."
        required: true
        weight: 1.0
        modality: visual
        repair_action: dense_sample
      - id: spatial_relation
        description: "Directly observe the relative position, direction, movement, or containment relation."
        required: true
        weight: 1.0
        modality: visual
        repair_action: dense_sample

  temporal:
    evidence_requirements:
      - id: event_identity
        description: "Identify every event or state involved in the temporal comparison."
        required: true
        weight: 0.9
        modality: multimodal
        repair_action: refine_query
      - id: temporal_anchors
        description: "Locate each event at a timestamp, dated statement, or unambiguous position in the video sequence."
        required: true
        weight: 1.0
        modality: temporal
        repair_action: time_sorted
      - id: temporal_relation
        description: "Establish the requested before, after, first, last, duration, or sequence relation."
        required: true
        weight: 1.0
        modality: temporal
        repair_action: time_sorted

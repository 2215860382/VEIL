    - name: discriminative_attribute_and_entity_grounding
      description: Evidence must explicitly ground specific visual attributes (text, colors, logos), functional roles, or identity markers to entities to distinguish between similar distractors and verify 'both', 'only', or identity-based options.
      score_1: Evidence explicitly transcribes or describes specific visual features (e.g., 'red N logo', 'right hand holds cue') and binds them to proper nouns (via ASR/OCR), distinguishing all candidate entities or states using unique attributes present in the options.
      score_half: Evidence mentions the entity or object but describes only partial attributes, relies on general context, or identifies entities generally without the explicit binding (name-to-face) or granular detail needed for definitive verification.

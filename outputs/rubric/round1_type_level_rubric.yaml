      score_1: Evidence provides a clear mapping between the metric value and its specific round/attempt index or entity attribution (e.g., 'first attempt at 5.60m for Duplantis'), allowing verification of ordinal options.
      score_half: Evidence lists metrics and mentions round numbers or entities separately but does not explicitly link the specific metric to the specific round/entity, requiring inference.

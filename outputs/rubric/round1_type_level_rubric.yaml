    - name: schedule_context_disambiguation
      description: Evidence must explicitly anchor events to specific calendar days or time windows and distinguish between 'standard' routines and 'current/updated' schedules to resolve ambiguity in multi-day or recurring event questions.
      score_1: Evidence explicitly ties all events to the correct day/time window and clarifies any deviations from standard routines (e.g., 'starting this week', 'new day'), allowing definitive exclusion of schedule-based distractors.
      score_half: Evidence ties most events to days but leaves one key event ambiguous, or fails to clarify if a routine is the standard or the current week's variation.

# Auto-generated evidence-sufficiency rubric.
# Criteria evaluate whether evidence can verify or exclude options, not answer correctness.

general:
  rubric_criteria:
  - name: evidence_coverage
    description: Evidence covers the key event, time window, state change, comparison target, or causal chain needed to verify or exclude each option.
    score_1: All evidence needed to verify or exclude the option is covered.
    score_half: Relevant evidence is present, but a key event, time window, state, comparison, or causal link is missing.
    score_0: The evidence does not cover the facts needed to judge the option.
    weight: 1.0
    failure_repair_action: dense_sample
  - name: evidence_specificity
    description: Evidence explicitly grounds the relevant person, object, action, scene, speaker, text, or spatial relation instead of only giving a generic related scene.
    score_1: The required entities, actions, attributes, or relations are unambiguously grounded.
    score_half: The evidence is relevant but leaves an entity, action, attribute, or relation ambiguous.
    score_0: The evidence is generic or concerns a different entity, action, attribute, or relation.
    weight: 1.0
    failure_repair_action: refine_query
  - name: evidence_consistency
    description: Evidence is internally consistent and contains enough contrary evidence to exclude options that conflict with the video.
    score_1: The evidence consistently establishes or rules out the option without unresolved conflict.
    score_half: The evidence points in one direction but leaves a conflict or distractor unresolved.
    score_0: The evidence conflicts internally or cannot establish or rule out the option.
    weight: 1.0
    failure_repair_action: refine_query
  scoring_rule: average
  sufficient_threshold: 0.8
type_aliases:
  Action Reasoning: action_reasoning
  Action Recognition: action_recognition
  Attribute Perception: attribute_perception
  Counting Problem: counting_problem
  Information Synopsis: information_synopsis
  OCR Problems: ocr_problems
  Object Reasoning: object_reasoning
  Object Recognition: object_recognition
  Spatial Perception: spatial_perception
  Spatial Reasoning: spatial_reasoning
  Temporal Perception: temporal_perception
  Temporal Reasoning: temporal_reasoning
templates:
  action_reasoning:
    rubric_criteria:
    - name: explicit_negation_and_absence
      description: Evidence must explicitly state the absence of a claimed action, object, or artifact, or explicitly contrast the observed reality with the option's claim (e.g., 'holding a baby instead of a thread'), rather than merely describing the replacement or the scene generally.
      score_1: Evidence contains a direct negation or explicit contrast that definitively excludes the option (e.g., 'X is NOT present', 'Y replaced X').
      score_half: Evidence describes the actual state or replacement object but lacks an explicit negation of the option's claim, leaving ambiguity about whether the option's claim also occurred.
      score_0: Evidence only describes the scene or confirms the replacement without addressing the specific claim of the option, making exclusion impossible.
      failure_repair_action: asr_match
      source_pair_examples:
      - 3:weak_vs_great:3:weak:iter0->3:great:final
      - 35:good_vs_great:35:good:iter1->35:great:iter2
      - 708:weak_vs_good:708:weak:iter0->708:good:iter1
    - name: causal_mechanism_explicitness
      description: Evidence must explicitly describe the physical, logical, or procedural mechanism linking a specific action to its outcome (e.g., 'action X generates force Y', 'consecutive hits reset score'), rather than merely listing the action and outcome in sequence.
      score_1: Evidence explicitly states the mechanism connecting the protagonist's action to the target's reaction or the final outcome, allowing definitive exclusion of alternative mechanisms.
      score_half: Evidence shows the action and outcome in temporal proximity but implies rather than states the causal link, leaving the reasoning inferred.
      score_0: Evidence lists the action and outcome separately without establishing a direct causal connection or explaining the underlying mechanic.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 286:good_vs_great:286:good:iter1->286:great:iter2
      - 436:good_vs_great:436:good:iter1->436:great:iter2
      - 633:weak_vs_good:633:weak:iter0->633:good:iter1
    - name: intent_and_context_disambiguation
      description: Evidence must provide contextual cues (visual reactions, genre logic, or explicit dialogue) to distinguish between ambiguous actions (e.g., playful teasing vs. genuine hostility, magic trick vs. concept) and rule out alternative motivations.
      score_1: Evidence explicitly identifies the intent or genre context (e.g., 'cartoon logic', 'playful reaction') that reframes the action, allowing definitive exclusion of distractors.
      score_half: Evidence shows the action and context separately but lacks an explicit synthesis clarifying the intent or nature of the interaction.
      score_0: Evidence describes the action literally without contextual cues, leaving the intent ambiguous or misinterpreting the genre.
      failure_repair_action: asr_match
      source_pair_examples:
      - 289:good_vs_great:289:good:iter1->289:great:iter2
      - 834:weak_vs_great:834:weak:iter0->834:great:final
      - 301:weak_vs_good:301:weak:iter0->301:good:iter1
    - name: temporal_sequence_fidelity
      description: Evidence must explicitly capture the chronological order of distinct interaction phases or events to distinguish between options describing immediate rejection, delayed abandonment, or specific ordinal positions (e.g., 'first' vs 'last').
      score_1: Evidence explicitly contains the dialogue or action for the initial state AND the subsequent state, establishing the sequence and ruling out options with incorrect timing.
      score_half: Evidence contains the final state and implies a prior interaction, but lacks the explicit text/action of the initial state or the specific ordinal label.
      score_0: Evidence only shows the final state or describes events in isolation without establishing a sequence, making it impossible to verify ordinal qualifiers.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 550:weak_vs_good:550:weak:iter0->550:good:iter1
      - 638:weak_vs_good:638:weak:iter0->638:good:iter1
      - 315:weak_vs_good:315:weak:iter0->315:good:iter1
    - name: comparative_feature_isolation
      description: Evidence must explicitly describe the presence or absence of a specific feature in the target segment AND confirm its status in the comparison segments to verify uniqueness, state changes, or strategic differentiation.
      score_1: Evidence explicitly states the feature exists in the target segment and is absent/different in the comparison segments, or explicitly tracks an entity's state change (T1 vs T2).
      score_half: Evidence describes the feature in the target segment but is ambiguous or silent about its presence in the comparison segments.
      score_0: Evidence describes the feature in the target segment but provides no information about the comparison segments, or describes different entities without establishing a change.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 638:weak_vs_good:638:weak:iter0->638:good:iter1
      - 649:weak_vs_good:649:weak:iter0->649:great:final
      - 411:good_vs_great:411:good:iter1->411:great:iter2
    - name: cross_segment_causal_linking
      description: Evidence must explicitly connect a general phenomenon, rule, or prior event discovered in one segment to a specific character's action in a different segment to establish the causal reason for that action.
      score_1: Evidence explicitly links the general concept or prior event (Segment A) to the specific actor's behavior (Segment B) through a clear narrative or visual bridge.
      score_half: Evidence contains both the concept/event and the character's action in separate segments but lacks an explicit narrative or logical bridge connecting them.
      score_0: Evidence mentions the concept or the action in isolation without linking them, or links the action to an incorrect cause.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 769:good_vs_great:769:good:iter1->769:great:iter2
      - 787:good_vs_great:787:good:iter1->787:great:iter2
      - 555:good_vs_great:555:good:iter1->555:great:iter2
    - name: entity_and_source_attribution
      description: Evidence must explicitly attribute specific quantitative values, conditions, or claims to the correct named entity (person, team, organization) and distinguish between official statements and external commentary.
      score_1: Evidence explicitly links the specific value/outcome/claim to the correct entity and source, clearly separating official positions from critics or third parties.
      score_half: Evidence mentions the value and the entity separately but lacks a direct explicit link in the same context, or fails to clearly demarcate which claims belong to the target entity.
      score_0: Evidence attributes values to the wrong entity, conflates general risks with specific diagnoses, or mixes official statements with external opinions.
      failure_repair_action: asr_match
      source_pair_examples:
      - 335:good_vs_great:335:good:iter1->335:great:iter2
      - 355:good_vs_great:355:good:iter1->355:great:iter2
      - 428:weak_vs_good:428:weak:iter0->428:good:iter1
  action_recognition:
    rubric_criteria:
    - name: temporal_window_alignment
      description: Evidence must explicitly contain observations from the specific time window, ordinal position, or frequency requested to verify actions occurring only in that segment, distinguishing between general occurrences and the specific queried instance.
      score_1: Evidence explicitly maps the target action to the specific time segment, ordinal count, or phase (e.g., 'third act', 'final battle') with direct visual or textual confirmation, allowing unique identification.
      score_half: Evidence identifies the action type but leaves the specific timing, order, or frequency ambiguous, inferred, or only partially grounded near the requested window.
      score_0: Evidence describes actions without temporal grounding, covers only segments outside the requested window, or fails to distinguish the target instance from similar events at other times.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 39:weak_vs_great:39:weak:iter0->39:great:final
      - 254:weak_vs_great:254:weak:iter0->254:great:final
      - 448:weak_vs_good:448:weak:iter0->448:good:iter1
      - 636:weak_vs_great:636:weak:iter0->636:great:final
    - name: causal_mechanism_specificity
      description: Evidence must explicitly identify the physical mechanism, causal agent, or specific interaction (e.g., point of contact, material, trigger) that defines the action, distinguishing between visually similar outcomes or accidental vs. intentional causes.
      score_1: Evidence clearly shows or states the specific mechanism (e.g., 'hits a ramp', 'dragging by tail', 'remote script') that uniquely verifies the action verb and excludes alternatives.
      score_half: Evidence describes the resulting motion or state change but lacks the explicit causal mechanism or agent, leaving ambiguity between similar action verbs or causes.
      score_0: Evidence only describes the result, setup, or actor presence without the specific interaction or mechanism required to distinguish options.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 168:good_vs_great:168:good:iter1->168:great:iter2
      - 283:good_vs_great:283:good:iter1->283:great:iter2
      - 517:weak_vs_good:517:weak:iter0->517:good:iter1
      - 596:weak_vs_good:596:weak:iter0->596:good:iter1
    - name: actor_state_and_role_disambiguation
      description: Evidence must explicitly distinguish the physical state, posture, or specific reaction of the target actor, and identify the specific actor role (performer vs. spectator) to exclude options requiring conflicting states or attributing actions to the wrong group.
      score_1: Evidence explicitly states the actor's posture, state, or specific reaction (e.g., 'sitting', 'abnormal', 'performer') and distinguishes the actor role, allowing direct exclusion of conflicting options.
      score_half: Evidence implies the state through context or describes a generic reaction without the specific detail needed to distinguish between similar options or actor roles.
      score_0: Evidence describes actions or triggers without clarifying posture, state, or specific reaction, or fails to distinguish who is acting, leaving ambiguity between conflicting options.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 39:weak_vs_great:39:weak:iter0->39:great:final
      - 296:weak_vs_good:296:weak:iter0->296:good:iter1
      - 647:good_vs_great:647:good:iter1->647:great:iter2
      - 648:weak_vs_great:648:weak:iter0->648:great:final
    - name: apparatus_and_context_disambiguation
      description: Evidence must explicitly distinguish between visually similar apparatuses, objects, or contexts using specific visual or textual markers to definitively exclude distractor options that rely on generic or similar descriptions.
      score_1: Evidence explicitly describes the specific apparatus, object variant, or setting (e.g., 'vertical poles', 'fire batons', 'stage with judges') in a way that is mutually exclusive with the distractor.
      score_half: Evidence describes the action or setting but uses ambiguous terms that could apply to both the video content and the distractor option.
      score_0: Evidence fails to describe the apparatus or setting, or describes it in a way that does not rule out the distractor, leaving the option unverifiable.
      failure_repair_action: refine_query
      source_pair_examples:
      - 636:weak_vs_great:636:weak:iter0->636:great:final
      - 639:weak_vs_good:639:weak:iter0->639:good:iter1
      - 648:weak_vs_great:648:weak:iter0->648:great:final
      - 654:weak_vs_good:654:weak:iter0->654:good:iter1
    - name: explicit_enumeration_and_state_grounding
      description: Evidence must contain explicit enumeration (spoken or text) of specific items, categories, UI states, or confirmations of absence to verify inclusion/exclusion, rather than relying on visual similarity or generic process descriptions.
      score_1: Evidence explicitly lists, names, or describes the specific option terms (e.g., 'Virtual Fighter', 'no headphones', 'icon turns grey') or confirms the exact state transition/absence.
      score_half: Evidence visually depicts the category or process but does not explicitly name it, confirm the final state, or address the presence/absence of the queried item.
      score_0: Evidence relies solely on visual similarity or describes the process without any textual/spoken confirmation of specific names, states, or explicit absence.
      failure_repair_action: asr_match
      source_pair_examples:
      - 254:weak_vs_great:254:weak:iter0->254:great:final
      - 405:good_vs_great:405:good:iter1->405:great:iter2
      - 754:weak_vs_good:754:weak:iter0->754:good:iter1
      - 835:weak_vs_great:835:weak:iter0->835:great:final
    - name: temporal_sequence_and_completion_integrity
      description: Evidence must provide the full temporal sequence of the target action (initiation, execution, conclusion) and explicitly ground the chronological order relative to reference events to verify completion status or 'immediately after' constraints.
      score_1: Evidence describes the complete action sequence from start to finish and explicitly links the timing to reference events, allowing verification of completion and temporal constraints.
      score_half: Evidence describes the start or middle of the action but is truncated at the critical moment of completion, or implies the sequence without explicit temporal markers.
      score_0: Evidence is missing the action entirely, is severely truncated, or fails to establish the chronological order, making completion status and timing unverifiable.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 652:good_vs_great:652:good:iter1->652:great:iter2
      - 755:weak_vs_good:755:weak:iter0->755:good:iter1
      - 842:weak_vs_good:842:weak:iter0->842:good:iter1
    - name: causal_and_narrative_linkage
      description: Evidence must explicitly connect distinct events, states, or actions through causal or narrative logic to distinguish between options that list similar events but lack the correct logical or causal bridge.
      score_1: Evidence explicitly states the causal link or narrative bridge between events/states (e.g., 'submission failed causing fight'), allowing verification of options requiring specific logical connections.
      score_half: Evidence mentions the relevant events or states in proximity but lacks the explicit connecting phrase or logical bridge to confirm the causal relationship.
      score_0: Evidence lists events or states as separate, unconnected facts, making it impossible to verify options that depend on a specific causal or narrative sequence.
      failure_repair_action: refine_query
      source_pair_examples:
      - 835:weak_vs_great:835:weak:iter0->835:great:final
      - 895:weak_vs_great:895:weak:iter0->895:great:final
      - 762:good_vs_great:762:good:iter1->762:great:iter2
  attribute_perception:
    rubric_criteria:
    - name: temporal_sequence_and_state_isolation
      description: Evidence must explicitly establish the chronological order of events and isolate the specific time window for the target attribute, distinguishing it from historical distractors or pre/post-event states to verify or exclude options.
      score_1: Evidence explicitly anchors the target attribute to the correct time window (e.g., 'before burning', 'second attempt') and excludes irrelevant historical interactions or other temporal states involving the same entities.
      score_half: Evidence mentions the correct time window or multiple events but lacks explicit ordering or clear temporal separation, risking false inference from distractors.
      score_0: Evidence fails to distinguish time windows or attempt order, mixing events from different eras or stages, leading to potential false attribution of the target attribute.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 2:good_vs_great:2:good:iter1->2:great:iter2
      - 5:weak_vs_great:5:weak:iter0->5:great:final
      - 55:weak_vs_good:55:weak:iter0->55:good:iter1
    - name: explicit_attribute_definition_and_contrast
      description: Evidence must explicitly define the specific qualities, material composition, or magnitude of the target attribute and provide direct verbal or visual contrast to definitively exclude all alternative material or descriptive claims in the options.
      score_1: Evidence explicitly names the correct material/attribute or provides visual/narrative proof that excludes all incorrect options (e.g., 'is lead' vs 'gold/silver', 'very large' vs 'large').
      score_half: Evidence negates one option or describes the attribute generally but fails to explicitly confirm the actual value or exclude other plausible alternatives mentioned in the options.
      score_0: Evidence provides no specific information about the attribute's composition, definition, or relative magnitude, or only offers generic descriptions.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 20:weak_vs_great:20:weak:iter0->20:great:final
      - 172:weak_vs_great:172:weak:iter0->172:great:final
      - 43:weak_vs_great:43:weak:iter0->43:great:final
    - name: causal_link_and_intent_explicitness
      description: Evidence must explicitly state the causal relationship, mechanism, or intent connecting a specific state/action to an outcome or attribute, rather than merely listing facts in proximity or relying on implicit inference.
      score_1: Evidence explicitly states the causal link (e.g., 'punished for divisions', 'slow tempo violates Beethoven's intent') or mechanism connecting the observed process to the target attribute change.
      score_half: Evidence mentions the state/action and the outcome in close proximity but lacks an explicit connecting verb, phrase, or logical bridge.
      score_0: Evidence mentions the state, action, or outcome in isolation without establishing the required causal or intentional relationship.
      failure_repair_action: asr_match
      source_pair_examples:
      - 25:weak_vs_great:25:weak:iter0->25:great:final
      - 41:weak_vs_great:41:weak:iter0->41:great:final
      - 169:weak_vs_good:169:weak:iter0->169:good:iter1
    - name: contextual_scope_and_negation
      description: Evidence must explicitly demonstrate the full scope of relevant interactions to prove the absence of distractors or provide explicit negation statements to rule out specific attributes for relevant items.
      score_1: Evidence explicitly shows alternative interactions to confirm the target is unique, or contains direct negation statements (e.g., 'not gold', 'not spicy') that definitively rule out distractor attributes.
      score_half: Evidence shows the target interaction clearly but lacks explicit evidence of other interactions to rule out distractors, or describes attributes as 'mild' without direct negation.
      score_0: Evidence only shows the target interaction or describes items neutrally without addressing the presence or absence of distractor attributes, making exclusion impossible.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 825:weak_vs_great:825:weak:iter0->825:great:final
      - 704:weak_vs_good:704:weak:iter0->704:good:iter1
      - 735:weak_vs_great:735:weak:iter0->735:great:final
    - name: entity_grounding_and_spatial_relation
      description: Evidence must explicitly ground the relevant person, object, action, scene, speaker, text, or spatial relation instead of only giving a generic related scene, ensuring the attribute is tied to the correct entity.
      score_1: Evidence explicitly identifies the specific entity and its spatial context (e.g., 'the red cup on the left table') and links the attribute directly to it, excluding similar entities in the scene.
      score_half: Evidence identifies the general scene or object type but lacks specific spatial or identity markers to distinguish the target from similar distractors.
      score_0: Evidence provides only generic scene descriptions or fails to link the attribute to a specific, identifiable entity, leading to ambiguity.
      failure_repair_action: refine_query
      source_pair_examples:
      - 101:weak_vs_good:101:weak:iter0->101:good:iter1
      - 203:weak_vs_great:203:weak:iter0->203:great:final
    - name: multi-modal_corroboration
      description: Evidence must integrate visual cues with ASR/caption data to confirm the attribute, ensuring that visual appearance aligns with spoken or textual claims to rule out hallucinations or misinterpretations.
      score_1: Evidence combines explicit visual confirmation (e.g., color, texture) with matching ASR/caption text to definitively verify the attribute and exclude conflicting modalities.
      score_half: Evidence relies on only one modality (visual or text) or shows a partial mismatch that requires assumption to resolve.
      score_0: Evidence relies on a single modality that is ambiguous or contradicts the other available modality without resolution.
      failure_repair_action: cross_modal_check
      source_pair_examples:
      - 305:weak_vs_great:305:weak:iter0->305:great:final
      - 412:weak_vs_good:412:weak:iter0->412:good:iter1
    - name: exclusionary_completeness
      description: Evidence must provide sufficient negative proof to rule out all incorrect options, ensuring that the absence of an attribute is as clearly demonstrated as its presence.
      score_1: Evidence explicitly demonstrates why every incorrect option is false (e.g., 'the object is not blue, it is green; it is not metal, it is plastic'), leaving no room for doubt.
      score_half: Evidence confirms the correct option but only implicitly or partially excludes one or more distractors, leaving some ambiguity.
      score_0: Evidence confirms the correct option but provides no information regarding the incorrect options, making it impossible to verify their falsity.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 506:weak_vs_great:506:weak:iter0->506:great:final
      - 618:weak_vs_good:618:weak:iter0->618:good:iter1
  counting_problem:
    rubric_criteria:
    - name: entity_enumeration_completeness
      description: Evidence must explicitly identify and distinguish every distinct entity or event satisfying the counting condition across the entire video, ensuring no valid instances are omitted and no duplicates are counted.
      score_1: Evidence lists and verifies every distinct entity, allowing the exact count to be determined and all options to be excluded.
      score_half: Evidence identifies some but not all distinct entities, or fails to distinguish between unique entities and repeated appearances, leaving the total count ambiguous.
      score_0: Evidence identifies only a subset of entities, uses generic collective terms, or fails to distinguish distinct individuals, making the count unverifiable.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 17:weak_vs_good:17:weak:iter0->17:great:final
      - 337:weak_vs_good:337:weak:iter0->337:great:final
      - 480:good_vs_great:480:good:iter1->480:great:iter2
    - name: temporal_exhaustiveness
      description: Evidence must cover the entire relevant time window or provide a definitive summary confirming the total count, ensuring no instances are missed in unshown segments or gaps between sampled clips.
      score_1: Evidence covers the full duration, explicitly confirms zero occurrences in gaps, or provides a definitive summary statement confirming the total count is final.
      score_half: Evidence covers most of the duration but leaves significant gaps where the target entity could appear, or lists instances without confirming the list is exhaustive.
      score_0: Evidence provides only isolated snapshots or a partial sequence with no indication of whether more instances exist in the unshown timeline.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 91:weak_vs_good:91:weak:iter0->91:good:iter1
      - 243:weak_vs_good:243:weak:iter0->243:great:final
      - 896:good_vs_great:896:good:iter1->896:great:iter2
    - name: entity_distinction_and_function
      description: Evidence must explicitly distinguish between visually similar items, different stages of the same item, or non-target objects by providing unique visual descriptors, functional confirmations, or clear temporal boundaries.
      score_1: Evidence clearly distinguishes all counted items as unique entities via unique descriptors, functional links (e.g., ASR confirmation), or clear transition markers, and excludes distractors.
      score_half: Evidence suggests distinct items but lacks explicit confirmation of uniqueness for at least one pair, or fails to functionally link an object to the target category.
      score_0: Evidence fails to distinguish between items, treats multiple segments as a single unit, or misidentifies objects due to lack of functional or visual differentiation.
      failure_repair_action: asr_match
      source_pair_examples:
      - 236:weak_vs_good:236:weak:iter0->236:great:final
      - 269:weak_vs_good:269:weak:iter0->269:great:final
      - 514:weak_vs_great:514:weak:iter0->514:great:final
    - name: event_boundary_and_completion
      description: Evidence must explicitly confirm the successful completion or distinct resolution of each counted event and clearly delineate separate instances from continuous actions, incomplete segments, or non-target repetitions.
      score_1: Evidence clearly describes the start and end (or resolution) of every distinct event, explicitly excludes incomplete/truncated segments, and distinguishes unique events from generic repetitions.
      score_half: Evidence shows the process of events but leaves the final resolution ambiguous, or fails to clearly separate distinct events from continuous sequences.
      score_0: Evidence only shows setup, partial processes, or conflates multiple distinct events into a single continuous action, preventing an accurate count.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 573:weak_vs_good:573:weak:iter0->573:good:iter1
      - 588:weak_vs_good:588:weak:iter0->588:good:iter1
      - 781:good_vs_great:781:good:iter1->781:great:iter2
    - name: comparative_exclusion_evidence
      description: Evidence must provide sufficient data points (metrics, counts, or status) for all candidate entities or options to definitively exclude those that do not meet the counting criteria.
      score_1: Evidence lists specific metrics or status for every candidate entity, allowing the exclusion of all options with counts higher or lower than the verified instances.
      score_half: Evidence lists metrics for the target option but misses data for one or more competing options, leaving ambiguity about whether the count could be higher or lower.
      score_0: Evidence only identifies positive instances without providing data for other candidates, making it impossible to exclude options claiming different counts.
      failure_repair_action: broadcast
      source_pair_examples:
      - 260:weak_vs_great:260:weak:iter0->260:great:final
      - 401:good_vs_great:401:good:iter1->401:great:iter2
      - 480:good_vs_great:480:good:iter1->480:great:iter2
    - name: explicit_count_grounding
      description: Evidence must contain explicit linguistic or visual confirmation of the total count (e.g., summary graphics, narrator stating 'X items', or a complete labeled list) rather than relying solely on the verifier to infer the total from a sequence of partial observations.
      score_1: Evidence explicitly states the total count or provides a visual summary that directly verifies the correct option and excludes all others.
      score_half: Evidence implies the count through a sequence of events or partial lists but lacks an explicit statement or graphic confirming the final accumulated total.
      score_0: Evidence shows individual instances or game states but fails to provide any explicit total count, summary, or enumeration mechanism to distinguish between options.
      failure_repair_action: broadcast
      source_pair_examples:
      - 522:weak_vs_great:522:weak:iter0->522:great:final
      - 609:weak_vs_great:609:weak:iter0->609:great:final
      - 892:good_vs_great:892:good:iter1->892:great:iter2
    - name: composite_technique_disambiguation
      description: Evidence explicitly clarifies whether a combined label or complex action (e.g., 'bullion + lazy daisy') represents a single unit or multiple distinct units for the purpose of the count.
      score_1: Evidence explicitly states whether a combined technique counts as one or multiple items in the total.
      score_half: Evidence shows the combined technique but does not explicitly state how it contributes to the count, requiring inference.
      score_0: Evidence mentions a combined technique without any clarification on its contribution to the total count.
      failure_repair_action: asr_match
      source_pair_examples:
      - 892:good_vs_great:892:good:iter1->892:great:iter2
  information_synopsis:
    rubric_criteria:
    - name: narrative_scope_and_intent_definition
      description: Evidence must explicitly define the video's primary narrative scope (e.g., priority debate vs. technical comparison) and functional intent (e.g., instruction vs. demonstration) using concrete markers like titles, dates, framing questions, or explicit purpose statements to distinguish the main topic from plausible distractors.
      score_1: Evidence includes specific markers (dates, counts, framing, titles, explicit intent statements) that definitively establish the video's scope and purpose, allowing the exclusion of options describing different scopes or intents.
      score_half: Evidence mentions conflicting claims or general topics but lacks specific investigative markers or explicit intent confirmation to fully distinguish the scope from a generic biography, technical review, or broader overview.
      score_0: Evidence only lists entities or generic facts without defining the relationship, scope, or intent, making it impossible to distinguish between competing main ideas.
      failure_repair_action: dense_sample
      source_pair_examples:

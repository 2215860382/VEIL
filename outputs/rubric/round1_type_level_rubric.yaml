    - name: temporal_sequence_and_case_isolation
      description: Evidence must explicitly map events to specific time windows, ordinal sequences, or distinct cases to verify progression, resolution, or temporal constraints, preventing conflation of similar entities across segments.
      score_1: Evidence clearly separates the target case from other similar cases using explicit temporal markers or case identifiers, maps ordinal references to specific timeline events, and covers critical phases (start, middle, end) to verify progression and resolution.
      score_half: Evidence mentions the target case but lacks clear separation from other similar cases, identifies events without explicit confirmation of their relative order, or covers only partial phases leaving the middle progression ambiguous.

      - 77:weak_vs_great:77:weak:iter0->77:great:final
    - name: state_transition_continuity
      description: Evidence must explicitly demonstrate the chronological progression of distinct actions or state changes (e.g., State A -> Action -> State B) to verify prerequisite relationships, rather than listing isolated actions or final states.
      score_1: Evidence explicitly shows the transition between steps or the object's state before and after specific actions, establishing a continuous logical chain that validates the causal/temporal link.
      score_half: Evidence shows the actions and final state but the intermediate state transition is implied or missing, making the strict order ambiguous or relying on inference.
      score_0: Evidence lists actions in isolation without showing state changes or temporal linkage, presenting them as disjointed events that cannot verify the sequence.
      failure_repair_action: time_sorted

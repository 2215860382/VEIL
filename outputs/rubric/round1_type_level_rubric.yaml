    - name: semantic_scope_and_terminology_disambiguation
      description: Evidence must explicitly distinguish between semantically similar concepts, scales, or scopes (e.g., 'treatment protocol' vs. 'biological process') and use the exact terminology found in options to definitively exclude distractors relying on vague associations.
      score_1: Evidence explicitly defines the term, scale, or scope (e.g., distinguishing 'Synthroid' treatment from natural conversion) and uses the exact option terminology to rule out distractors, providing a complete causal chain that logically excludes unmentioned factors.
      score_half: Evidence mentions the relevant concepts but lacks the specific context or qualifiers needed to rule out a plausible distractor, or names a related concept without the specific terminology required to distinguish between similar options.
      score_0: Evidence mentions terms vaguely, conflates distinct concepts, or provides only generic context without linking to the specific causal terms in the options, allowing a distractor based on semantic similarity to remain plausible.

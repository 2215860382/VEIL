    - name: comparative_aggregation_and_scope_completeness
      description: Evidence must explicitly state the aggregation method (e.g., 'combined', 'sum') for superlative claims and identify/describe ALL entities listed in the options to enable valid exclusion or verification of 'most distinct' or 'different' options.
      score_1: Evidence explicitly states the target exceeds the sum/combined total of alternatives (e.g., 'more than X, Y, and Z combined') and explicitly identifies/describes every option entity, enabling a complete comparison and definitive exclusion of distractors.
      score_half: Evidence lists alternatives and the target in a comparative context but lacks the explicit 'combined' qualifier, or identifies most options but misses one or describes them ambiguously, leaving the logical exclusion or superlative ranking ambiguous.
      score_0: Evidence mentions the target and alternatives separately without a clear comparative relationship, or fails to identify one or more options entirely, making comparative reasoning or superlative verification impossible.

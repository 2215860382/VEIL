    - name: negative_entity_verification
      description: Evidence explicitly confirms the absence of a specific entity, term, or concept required to exclude an option, rather than just providing evidence for a related but distinct concept or failing to mention the term.
      score_1: Evidence explicitly states the specific term is absent or clearly distinguishes the described concept from the option's specific term, allowing definitive exclusion.
      score_half: Evidence describes a related concept (e.g., 'matter') but does not explicitly confirm the absence of the specific option term (e.g., 'dark matter'), leaving exclusion ambiguous.
      score_0: Evidence is missing or only provides generic context that could support the option, failing to exclude it.

  spatial_perception:
    rubric_criteria:
    - name: relative_spatial_orientation
      description: Evidence explicitly describes the facing direction or relative position (e.g., left, right, front, back) of one subject with respect to another, rather than just identifying their presence in the same scene.
      score_1: Evidence explicitly states the relative facing direction (e.g., 'facing left of', 'sitting to the right of') or provides a clear visual description allowing unambiguous deduction of the relative orientation.
      score_half: Evidence describes the positions of both subjects relative to a common reference (e.g., camera, desk) but does not explicitly state the relationship between them, requiring inference that may be ambiguous.
      score_0: Evidence identifies the subjects and the scene but provides no information regarding their relative positions or facing directions.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 250:good_vs_great:250:good:iter1->250:great:iter2
    - name: spatial_quadrant_verification
      description: Evidence explicitly identifies the specific quadrant (e.g., lower left, upper right) or precise relative position of the target object within the frame, rather than just general presence in the scene.
      score_1: Evidence explicitly states the target object is in the specific quadrant/position required by the question (e.g., 'green model in lower left').
      score_half: Evidence describes the object's general location in the scene (e.g., 'on the stairs', 'in the background') but lacks the specific quadrant or precise frame-relative position needed to confirm the option.
      score_0: Evidence mentions the object's presence in the scene but provides no spatial details, or the spatial details are ambiguous.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 740:weak_vs_good:740:weak:iter0->740:good:iter1
    - name: spatial_exclusion_sufficiency
      description: Evidence contains sufficient negative spatial constraints to definitively exclude incorrect options, distinguishing between 'not seen' and 'confirmed absent'.
      score_1: Evidence explicitly confirms the absence of a target in a specific required location or orientation, or provides a complete spatial map that logically excludes the option.
      score_half: Evidence notes the target is not visible in the current frame but lacks confirmation that it is absent from the relevant spatial context or time window.
      score_0: Evidence fails to address the spatial location of the target, leaving the option's validity unknown.
      failure_repair_action: refine_query
      source_pair_examples: []
    - name: multi_object_spatial_relation
      description: Evidence establishes the spatial relationship between multiple objects simultaneously to verify complex comparative options.
      score_1: Evidence explicitly links the positions of all relevant objects in a single coherent description (e.g., 'A is left of B, which is above C').
      score_half: Evidence describes objects individually or in pairs but fails to establish the complete relational chain required to verify the option.
      score_0: Evidence identifies objects but provides no relational data between them.
      failure_repair_action: dense_sample
      source_pair_examples: []
    - name: temporal_spatial_consistency
      description: Evidence maintains consistent spatial descriptions across the relevant time window, ensuring state changes or movements are accurately captured.
      score_1: Evidence tracks the object's position across the time window, confirming stability or explicitly describing the movement trajectory.
      score_half: Evidence provides a snapshot at one time point but lacks confirmation of spatial state at other critical moments in the window.
      score_0: Evidence provides conflicting spatial descriptions at different timestamps or ignores temporal context entirely.
      failure_repair_action: refine_query
      source_pair_examples: []
  spatial_reasoning:
    rubric_criteria:
    - name: landmark_uniqueness
      description: Evidence must explicitly identify unique, non-generic architectural landmarks (e.g., specific obelisks, domes, named squares) that distinguish the location from other cities with similar generic features.
      score_1: Evidence explicitly names or visually confirms unique landmarks that only exist in the target location, allowing definitive exclusion of all other options.
      score_half: Evidence identifies generic features (e.g., 'stone stairs', 'European square') or partial landmarks that suggest a region but do not uniquely identify the specific city/country.
      score_0: Evidence only describes generic settings (e.g., 'outdoor', 'stairs', 'plaza') without any unique identifying features.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 739:weak_vs_great:739:weak:iter0->739:great:final
    - name: event_contextual_anchor
      description: Evidence must link the spatial setting to a specific named event, brand, or title that provides external knowledge constraints on the location (e.g., a fashion show title known to be held in a specific country).
      score_1: Evidence explicitly displays a title or brand (e.g., 'VALENTINO The Beginning') that uniquely constrains the location to a specific country/city.
      score_half: Evidence mentions a brand or event type but lacks the specific title or visual confirmation linking it to the location.
      score_0: Evidence describes the event (e.g., 'fashion show') without any specific naming or branding that aids location identification.
      failure_repair_action: asr_match
      source_pair_examples:
      - 739:weak_vs_great:739:weak:iter0->739:great:final
    - name: source_entity_identification
      description: Evidence must explicitly identify the primary source entity (e.g., movie title, book name, specific case name) mentioned in the video to disambiguate between options that share similar generic plot elements or spatial settings.
      score_1: Evidence explicitly names or visually displays the title of the source work, allowing unique mapping of plot-specific entities to the correct option.
      score_half: Evidence implies the source work through strong contextual clues (e.g., actor names, specific plot points) but lacks the explicit title confirmation.
      score_0: Evidence only describes generic scenes or character actions without identifying the source work, making it impossible to distinguish between options with similar themes.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 199:weak_vs_great:199:weak:iter0->199:great:final
    - name: spatial_causal_linkage
      description: Evidence explicitly links specific spatial details (e.g., object location, victim position, scene layout) to the verification of an option via on-screen text or direct statement, rather than implying the link through separate facts.
      score_1: Evidence contains a direct statement or graphic explicitly stating the spatial relationship required to verify the option (e.g., 'located in [Specific Place]').
      score_half: Evidence states the spatial context and the event separately, but does not explicitly link them in a conditional or definitive statement.
      score_0: Evidence mentions the location or the event in isolation without establishing the spatial relationship required to verify the specific option.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 185:weak_vs_great:185:weak:iter0->185:great:final
    - name: evidence_coverage
      description: Evidence covers the key event, time window, state change, comparison target, or causal chain needed to verify or exclude each option.
      score_1: Evidence provides a complete chain covering all necessary temporal and spatial constraints to definitively verify the correct option and exclude all distractors.
      score_half: Evidence covers the primary event or location but misses a critical temporal window, comparison target, or state change needed to fully exclude a specific distractor.
      score_0: Evidence is fragmented, missing the core event or location entirely, or fails to address the specific constraints of the question options.
      failure_repair_action: refine_query
      source_pair_examples: []
    - name: evidence_specificity
      description: Evidence explicitly grounds the relevant person, object, action, scene, speaker, text, or spatial relation instead of only giving a generic related scene.
      score_1: Evidence pinpoints exact entities (e.g., 'the red car on the left', 'Speaker A at 00:12') and their precise spatial relations required for the answer.
      score_half: Evidence identifies the general scene or object type but lacks the specific attributes or precise spatial positioning needed to distinguish between similar options.
      score_0: Evidence relies on vague descriptions (e.g., 'a car', 'someone') or generic scene summaries that could apply to multiple options.
      failure_repair_action: refine_query
      source_pair_examples: []
    - name: evidence_consistency
      description: Evidence is internally consistent and contains enough contrary evidence to exclude options that conflict with the video.
      score_1: Evidence presents a coherent narrative where all spatial and temporal details align, explicitly contradicting the premises of incorrect options.
      score_half: Evidence is mostly consistent but contains minor ambiguities or lacks explicit contradictory details to rule out a plausible distractor.
      score_0: Evidence contains internal contradictions (e.g., conflicting timestamps or locations) or fails to provide any information that contradicts incorrect options.
      failure_repair_action: refine_query
      source_pair_examples: []
  temporal_perception:
    rubric_criteria:
    - name: comparative_volume_evidence
      description: Evidence must provide sufficient distinct segments, time durations, or variant counts for ALL competing options to enable a quantitative or qualitative comparison of 'most space' or 'primary focus'.
      score_1: Evidence includes sufficient segments/duration for all top contenders to definitively rank them by volume/focus.
      score_half: Evidence covers the top contender well but lacks sufficient segments for the runner-up to confirm the ranking.
      score_0: Evidence only covers one option or lacks enough segments to compare the relative 'space' devoted to options.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 259:weak_vs_great:259:weak:iter0->259:great:final
    - name: temporal_state_sequence
      description: Evidence must explicitly establish the chronological order of states (e.g., score, lead status) across multiple time points to pinpoint the exact interval where a state change (e.g., overtake, comeback) occurred.
      score_1: 'Evidence provides a clear chronological sequence of states (Time A: State X, Time B: State Y) that definitively bounds the event.'
      score_half: Evidence provides multiple time points but the chronological order is ambiguous or the state change is not clearly bounded by the provided points.
      score_0: Evidence provides isolated time points without establishing a sequence, or fails to show the state change across the timeline.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 425:good_vs_great:425:good:iter1->425:great:iter2
    - name: temporal_narrative_coherence
      description: Evidence must explicitly link the initial state and final state within the same specific event context (e.g., same match, same day) to verify 'comeback' or 'defeat' options, rather than presenting disjointed clips from different events.
      score_1: Evidence explicitly identifies the specific event and provides a continuous or logically linked narrative from the initial deficit to the final outcome.
      score_half: Evidence shows the initial deficit and the final outcome but lacks the explicit event identifier or the logical link between them (e.g., clips from different matches mixed).
      score_0: Evidence shows isolated states without confirming they belong to the same match or event.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 470:weak_vs_great:470:weak:iter0->470:great:final
    - name: temporal_event_linkage
      description: Evidence must explicitly link a specific event (e.g., mishap, action) to a specific temporal marker (day of week, time of day) either within the same clip or through unambiguous visual/ASR continuity across clips.
      score_1: The specific event is explicitly labeled with the required temporal marker, or the link is unambiguous via visual continuity (e.g., same outfit, scene setup) to a labeled segment.
      score_half: The event is described, and a temporal marker exists in a nearby segment, but the link is ambiguous (e.g., different outfits, no explicit 'yesterday/today' reference).
      score_0: The event is identified, but no temporal marker is present in the event's clip, and no clear continuity links it to a labeled segment.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 691:weak_vs_good:691:weak:iter0->691:good:iter1
  temporal_reasoning:
    rubric_criteria:
    - name: temporal_anchor_precision
      description: Evidence must provide explicit, unambiguous temporal markers (timestamps, ordinal numbers, or sequential narrative cues like 'first/then') for every event listed in the options to definitively establish absolute or relative order, rather than relying on generic presence or vague relative terms.
      score_1: Evidence contains explicit, unambiguous temporal anchors for all events in the option sequence, allowing a definitive chronological reconstruction and immediate exclusion of incorrect permutations.
      score_half: Evidence provides temporal markers for some events but leaves the relative order of at least two events ambiguous or relies on vague narrative cues requiring manual sorting.
      score_0: Evidence lists events present in the video but lacks any explicit temporal markers or logical connectors to determine their sequence, making verification impossible.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 501:good_vs_great:501:good:iter1->501:great:iter2
      - 507:good_vs_great:507:good:iter1->507:great:iter2
      - 729:weak_vs_great:729:weak:iter0->729:great:final
      - 877:weak_vs_good:877:weak:iter0->877:great:final
    - name: sequence_completeness_via_exclusion
      description: Evidence must explicitly confirm the presence and order of events in the correct option AND provide negative evidence (explicit confirmation of absence) for events listed in incorrect options to fully exclude distractors.
      score_1: Evidence confirms the order of all events in the correct option and explicitly states the absence of events listed in distractors within the relevant temporal scope, or provides context making the distractor impossible.
      score_half: Evidence confirms the order of present events but fails to explicitly confirm the absence of distractor events, relying on implicit absence or generic scenes that do not match specific distractor characteristics.
      score_0: Evidence fails to establish the order of events or ignores events listed in options without comment, leaving distractors unverifiable and preventing true/false/unknown determination.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 501:good_vs_great:501:good:iter1->501:great:iter2
      - 570:weak_vs_great:570:weak:iter0->570:great:final
      - 535:good_vs_great:535:good:iter1->535:great:iter2
      - 791:good_vs_great:791:good:iter1->791:great:iter2
    - name: event_boundary_and_disambiguation
      description: Evidence must clearly distinguish the start/end of specific actions or separate thematically similar topics (e.g., definition vs. strategy, creation vs. release) to prevent misattribution of timestamps or conflation of distinct steps.
      score_1: Evidence clearly delineates the transition into and out of each specific action or explicitly differentiates similar topics using unique visual cues, title text, or specific content examples, confirming the specific introduction point.
      score_half: Evidence describes the action or topic but lacks clear transition markers or specific differentiating details, risking confusion between adjacent movements or similar sections.
      score_0: Evidence describes a generic movement, conflates distinct milestones (e.g., creation and release), or treats similar topics as a single block, failing to confirm the specific introduction point or order.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 214:weak_vs_great:214:weak:iter0->214:great:final
      - 220:weak_vs_good:220:weak:iter0->220:great:final
      - 238:weak_vs_great:238:weak:iter0->238:great:final
      - 597:weak_vs_great:597:weak:iter0->597:great:final
    - name: narrative_segmentation_clarity
      description: Evidence must clearly delineate distinct narrative segments for each event, preventing the conflation of topics that occur at different times, and explicitly link events via narrative cues (e.g., 'after X', 'next') or visual continuity.
      score_1: Evidence clearly separates events into distinct segments with clear transition markers and explicit narrative/visual links that order all events in the option, distinguishing brief mentions from substantive discussions.
      score_half: Evidence separates events but transition markers are weak, ambiguous, or missing for at least one pair, requiring inference to determine the sequence or failing to weigh main segments over intro mentions.
      score_0: Evidence mixes events from different time periods into a single description or lists events in isolation without temporal connectors, making the order unverifiable.
      failure_repair_action: time_sorted
      source_pair_examples:

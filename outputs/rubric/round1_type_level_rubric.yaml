  ocr_problems:
    rubric_criteria:
    - name: visual_text_grounding
      description: Evidence explicitly confirms the presence of specific text strings (names, titles, dates, numbers) visible on screen via OCR to verify entities, rather than relying solely on ASR transcription which may contain errors or omissions.
      score_1: Evidence explicitly describes the text visible on the screen (e.g., 'text labels E.P. Joslin and F.G. Benedict appear on the slide') matching the option, independent of ASR.
      score_half: Evidence mentions the visual presence of the entity (e.g., 'portraits of Joslin') but relies on ASR for the specific spelling or full name, or describes the text vaguely without quoting it.
      score_0: Evidence relies entirely on ASR to identify the entity without confirming the text is visually present on the screen, or fails to mention the visual text entirely.
      failure_repair_action: asr_match
      source_pair_examples:
      - 68:good_vs_great:68:good:iter1->68:great:iter2
    - name: temporal_event_alignment
      description: Evidence must explicitly link a specific OCR-extracted value (score, counter, metric) or state to the exact temporal moment of the target event (e.g., 'halftime', 'meeting teammate', 'final score'), rather than listing values found elsewhere in the video or at different times.
      score_1: Evidence explicitly states the value displayed on screen at the exact moment the target event occurs or concludes, often co-occurring with a specific event label (e.g., 'HALFTIME' text).
      score_half: Evidence provides the value and the event separately but does not explicitly confirm they happen simultaneously or in the same continuous shot, requiring inference.
      score_0: Evidence lists values from the video but fails to associate any specific value with the target event timestamp, or provides values from unrelated times.
      failure_repair_action: time_sorted
      source_pair_examples:

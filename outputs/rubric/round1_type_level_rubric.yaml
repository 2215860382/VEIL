      - 597:weak_vs_great:597:weak:iter0->597:great:final
      - 10:weak_vs_good:10:weak:iter0->10:good:iter1
    - name: ordinal_boundary_verification
      description: Evidence must confirm the existence and content of segments immediately following (or preceding) a target item to validate its specific ordinal position (e.g., 'second to last', '4th step') and exclude options based on rank.
      score_1: Evidence explicitly describes the content of all segments following the target item up to the end of the video, or provides a complete list of the final N segments to confirm the specific rank and exclude rank-based distractors.
      score_half: Evidence describes some but not all segments following the target, or implies the end without listing the specific intervening items, leaving the exact ordinal position ambiguous.
      score_0: Evidence stops at the target item or describes segments before it, with no information on what follows, making it impossible to verify the rank or exclude options based on position.

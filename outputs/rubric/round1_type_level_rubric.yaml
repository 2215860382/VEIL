      description: Evidence must explicitly address and refute the specific false premise (e.g., financial status, motive) embedded in a distractor or state negative outcomes/incompatibility to definitively rule out plausible but incorrect options.
      score_1: Evidence explicitly states the true condition (e.g., 'wealthy', 'toxic') that directly contradicts the option's false premise, or explicitly names a specific counter-example to exclude universal claims ('All', 'Every').
      score_half: Evidence implies the true condition through context but does not explicitly state the contradictory fact, or implies the existence of a counter-example without explicit comparison to other categories, leaving the false premise partially plausible.

  object_reasoning:
    rubric_criteria:
    - name: causal_mechanism_and_chain_explicitness
      description: Evidence must explicitly name the specific intermediate mechanism, physical agent, or multi-step causal loop linking an event to an outcome, rather than describing only the static state, generic context, or isolated variables.
      score_1: Evidence explicitly states the specific mechanism (e.g., 'T4-to-T3 conversion', 'microbes causing agitation') or traces the full causal sequence (e.g., 'Spending -> Income -> Credit'), definitively ruling out distractors that conflate result with cause or propose alternative mechanisms.
      score_half: Evidence mentions the event and outcome or uses generic terms (e.g., 'biological pathway', 'outside forces') consistent with the option but lacks the specific intermediate link or fails to connect the logic between cause and effect.
      score_0: Evidence describes only the static state, the final outcome, or isolated variables without explaining the transmission mechanism, making verification of the causal claim impossible.
      failure_repair_action: asr_match

      score_1: Evidence explicitly states the secondary event occurs *as* the target action begins or *immediately triggers* the transition, ruling out preceding or subsequent poses.
      score_half: Evidence places the secondary event and the target action in the same segment but lacks explicit phrasing linking their onsets, leaving ambiguity about whether the event happened before, during, or after the action's start.
      score_0: Evidence lists the secondary event and the target action separately without establishing a temporal link, or places the event in a segment where the target action is not the primary focus.

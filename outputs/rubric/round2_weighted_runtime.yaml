      score_1: Evidence explicitly states the theme of the target time window and distinguishes it from subsequent or preceding topics, allowing definitive verification of the opening focus.
      score_half: Evidence mentions the topic of the target window but lacks a clear distinction between the opening summary and the rest of the video, or relies on inference from a single visual without narrative confirmation.

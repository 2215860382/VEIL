# Weighted rubric (step 4): criteria importance 1-5 + positive-framed
# groundedness guard in `general` (anti-gaming, no negative weights).
# source: outputs/rubric/overnight_20260627_full720/round2_merged_runtime.yaml

general:
  rubric_criteria:
  - name: evidence_coverage
    description: Evidence covers the key event, time window, state change, comparison target, or causal chain needed to verify or exclude each option.
    score_1: All evidence needed to verify or exclude the option is covered.
    score_half: Relevant evidence is present, but a key event, time window, state, comparison, or causal link is missing.
    score_0: The evidence does not cover the facts needed to judge the option.
    weight: 5.0
    failure_repair_action: dense_sample
  - name: evidence_specificity
    description: Evidence explicitly grounds the relevant person, object, action, scene, speaker, text, or spatial relation instead of only giving a generic related scene.
    score_1: The required entities, actions, attributes, or relations are unambiguously grounded.
    score_half: The evidence is relevant but leaves an entity, action, attribute, or relation ambiguous.
    score_0: The evidence is generic or concerns a different entity, action, attribute, or relation.
    weight: 5.0
    failure_repair_action: refine_query
  - name: evidence_consistency
    description: Evidence is internally consistent and contains enough contrary evidence to exclude options that conflict with the video.
    score_1: The evidence consistently establishes or rules out the option without unresolved conflict.
    score_half: The evidence points in one direction but leaves a conflict or distractor unresolved.
    score_0: The evidence conflicts internally or cannot establish or rule out the option.
    weight: 5.0
    failure_repair_action: refine_query
  - name: evidence_groundedness
    description: The verify/exclude decision for this option rests on facts ACTUALLY present in the retrieved evidence chunks, not on world knowledge, the wording of the option, or invented visual/audio details.
    score_1: Every fact used to confirm or rule out this option is explicitly stated in the retrieved evidence.
    score_half: The decision partly relies on plausible inference that goes beyond what the evidence states.
    score_0: The decision depends on details not present in the evidence (outside knowledge, option-text echo, or invented specifics).
    failure_repair_action: refine_query
    weight: 3.0
  scoring_rule: average
  sufficient_threshold: 0.8
type_aliases:
  Action Reasoning: action_reasoning
  Action Recognition: action_recognition
  Attribute Perception: attribute_perception
  Counting Problem: counting_problem
  Information Synopsis: information_synopsis
  OCR Problems: ocr_problems
  Object Reasoning: object_reasoning
  Object Recognition: object_recognition
  Spatial Perception: spatial_perception
  Spatial Reasoning: spatial_reasoning
  Temporal Perception: temporal_perception
  Temporal Reasoning: temporal_reasoning
templates:
  action_reasoning:
    rubric_criteria:
    - name: explicit_causal_and_motivational_grounding
      description: Evidence must contain the complete, untruncated linguistic statement or explicit visual sequence linking a specific action to its precise intent, motive, or causal mechanism, rather than describing the action in isolation or implying the reason through context.
      score_1: Evidence explicitly states the full 'Action -> Intent' clause (e.g., 'did X to achieve Y') or shows the specific causal mechanism (e.g., 'simulations proved Z'), allowing definitive verification of the correct option and exclusion of distractors with different motives or causes.
      score_half: Evidence describes the action and the context but the specific causal clause is truncated, implied, or missing the explicit link to the motive/mechanism, leaving ambiguity between similar options.
      score_0: Evidence only describes the action, the outcome, or the general situation without any explicit statement or visual confirmation of the underlying reason, intent, or specific mechanism, making it impossible to distinguish between options with different motivations.
      failure_repair_action: asr_match
      source_pair_examples:
      - 301:weak_vs_good:301:weak:iter0->301:good:iter1
      - 311:weak_vs_great:311:weak:iter0->311:great:final
      - 146:weak_vs_great:146:weak:iter0->146:great:final
      - 776:weak_vs_great:776:weak:iter0->776:great:final
      - 890:good_vs_great:890:good:iter1->890:great:iter2
      weight: 5.0
    - name: specific_entity_and_attribute_disambiguation
      description: Evidence must explicitly identify the specific entity, artifact, or attribute involved in a comparison, modification, or misconception, distinguishing it from co-occurring but distinct factors or general categories to exclude options that conflate them.
      score_1: Evidence explicitly names the specific source, attribute, or entity (e.g., 'graves' vs 'murals', 'baby attached to thread', 'Angkor Wat') and clarifies its specific role or state, allowing definitive exclusion of options claiming different sources, attributes, or conflated causes.
      score_half: Evidence mentions the general category or the entity but fails to specify the exact type, state, or comparative logic, leaving ambiguity about whether the specific attribute is present or if the correct entity is the focus.
      score_0: Evidence describes the scene or topic generally without identifying the specific entity, artifact, or attribute required to distinguish between options, making it impossible to verify the specific claim or exclude the distractor.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 3:weak_vs_great:3:weak:iter0->3:great:final
      - 35:good_vs_great:35:good:iter1->35:great:iter2
      - 176:weak_vs_great:176:weak:iter0->176:great:final
      - 795:weak_vs_good:795:weak:iter0->795:good:iter1
      - 865:weak_vs_great:865:weak:iter0->865:great:final
      weight: 5.0
    - name: reaction_and_outcome_verification
      description: Evidence must explicitly capture the specific emotional reaction, factual outcome, or recipient's response immediately following an action or claim to distinguish between genuine intent, mistaken belief, or the true nature of an interaction.
      score_1: Evidence explicitly states the specific reaction (e.g., 'laughter', 'ick'), the factual result (e.g., 'DNA test proved negative'), or the recipient's emotional state, allowing definitive verification of the character's decision, belief state, or the interaction's nature.
      score_half: Evidence shows the action or claim but the specific reaction, result, or recipient's response is ambiguous, implied, or missing, leaving the character's intent or the final outcome unverifiable.
      score_0: Evidence only describes the setup, the action, or the claim without revealing the immediate reaction, result, or recipient's response, making it impossible to determine if the actor was mistaken, deceptive, or if the interaction was hostile or playful.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 288:weak_vs_good:288:weak:iter0->288:great:final
      - 314:weak_vs_great:314:weak:iter0->314:great:final
      - 187:weak_vs_good:187:weak:iter0->187:good:iter1
      - 850:weak_vs_good:850:weak:iter0->850:good:iter1
      weight: 5.0
    - name: comprehensive_negative_evidence_scope
      description: Evidence must provide sufficient temporal coverage or explicit confirmation to verify the absence of a specific trait, action, or case detail across the relevant scope, rather than relying on the absence of evidence in a limited or non-representative sample.
      score_1: Evidence covers a representative sample of all distinct segments or explicitly states the non-occurrence of the claimed trait/action throughout the video, allowing definitive exclusion of options claiming a shared preference, habit, or alternative case details.
      score_half: Evidence shows the trait/action is absent in the provided clips but lacks confirmation that these clips represent the full scope of the video, leaving ambiguity about unshown segments or alternative cases.
      score_0: Evidence only shows the presence of other actions or a limited set of clips without addressing the potential existence of the claimed trait/action in the rest of the video, making it impossible to definitively exclude the option.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 298:good_vs_great:298:good:iter1->298:great:iter2
      - 186:weak_vs_great:186:weak:iter0->186:great:final
      - 239:good_vs_great:239:good:iter1->239:great:iter2
      - 777:good_vs_great:777:good:iter1->777:great:iter2
      - 824:weak_vs_good:824:weak:iter0->824:good:iter1
      weight: 5.0
    - name: state_transformation_contrast
      description: Evidence must explicitly contrast the subject's pre-intervention state with their post-intervention state to verify a transformation, distinguishing between transient pressures/challenges and the ultimate outcome.
      score_1: Evidence explicitly states the initial negative state and the resulting positive state using contrastive language, clearly identifying the final outcome as a resolution rather than a persistent struggle.
      score_half: Evidence describes the positive outcome or negative initial state separately but lacks an explicit linguistic or narrative bridge connecting them as a direct transformation, leaving ambiguity about whether the negative state persists.
      score_0: Evidence only describes the initial state, the final state, or isolated feelings without establishing a causal or temporal link between the intervention and the change in state.
      failure_repair_action: asr_match
      source_pair_examples:
      - 333:weak_vs_great:333:weak:iter0->333:great:final
      - 404:weak_vs_great:404:weak:iter0->404:great:final
      - 623:weak_vs_great:623:weak:iter0->623:great:final
      - 649:weak_vs_good:649:weak:iter0->649:good:iter1
      weight: 4.0
    - name: trigger_event_specificity
      description: Evidence must explicitly identify the specific, immediate precipitating event (e.g., a mask removal, a specific utterance, a visual breach) that directly causes the protagonist's action, rather than describing general context, philosophy, or aftermath.
      score_1: Evidence explicitly shows or states the specific trigger event occurring immediately prior to the action, allowing definitive verification of the cause and exclusion of alternative motivations.
      score_half: Evidence shows the action and general context but lacks the specific visual or dialogue of the trigger event, leaving ambiguity between competing causal explanations (e.g., betrayal vs. identity reveal).
      score_0: Evidence only describes the protagonist's general philosophy, the aftermath, or the action itself without showing the specific event that triggered it.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 321:weak_vs_good:321:weak:iter0->321:good:iter1
      - 560:weak_vs_great:560:weak:iter0->560:great:final
      - 607:good_vs_great:607:good:iter1->607:great:iter2
      weight: 5.0
    - name: explicit_negation_and_absence
      description: Evidence must explicitly state the absence of a claimed action, object, or artifact, or explicitly contrast the observed reality with the option's claim, rather than merely describing the replacement or the scene generally.
      score_1: Evidence contains a direct negation or explicit contrast that definitively excludes the option (e.g., 'X is NOT present', 'Y replaced X').
      score_half: Evidence describes the actual state or replacement object but lacks an explicit negation of the option's claim, leaving ambiguity about whether the option's claim also occurred.
      score_0: Evidence only describes the scene or confirms the replacement without addressing the specific claim of the option, making exclusion impossible.
      failure_repair_action: asr_match
      source_pair_examples:
      - 3:weak_vs_great:3:weak:iter0->3:great:final
      - 35:good_vs_great:35:good:iter1->35:great:iter2
      - 708:weak_vs_good:708:weak:iter0->708:good:iter1
      - 894:weak_vs_great:894:weak:iter0->894:great:final
      weight: 5.0
  action_recognition:
    rubric_criteria:
    - name: temporal_action_disambiguation
      description: Evidence must explicitly distinguish the target actor's specific action in the requested time window from their actions (or similar actors' actions) in other segments, preventing false attribution based on out-of-context events.
      score_1: Evidence explicitly shows the target actor performing the target action in the specific time window and explicitly shows them performing a different action (or being absent) in other segments, or explicitly attributes the distractor action to a different actor.
      score_half: Evidence shows the target action in the time window but fails to explicitly rule out the distractor action occurring in the same window, or relies on inference that the actor cannot be in two places at once without explicit visual confirmation of the alternative.
      score_0: Evidence shows the actor performing the distractor action in a different segment and the target action in another, without clarifying which action occurs in the specific time window requested, leading to ambiguity.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 39:weak_vs_great:39:weak:iter0->39:great:final
      - 418:weak_vs_good:418:weak:iter0->418:good:iter1
      - 438:good_vs_great:438:good:iter1->438:great:iter2
      - 448:weak_vs_good:448:weak:iter0->448:good:iter1
      weight: 5.0
    - name: causal_mechanism_and_state_linkage
      description: Evidence must explicitly link a specific stimulus, physical mechanism, or actor attribute to the resulting state change or action outcome, rather than describing components or events in isolation.
      score_1: Evidence explicitly names the specific stimulus/mechanism (e.g., 'solidified rind', 'blue electricity', 'player with hairbands') and describes the immediate resulting state or action (e.g., 'trapped gas', 'abnormal state', 'smashed ball'), allowing definitive verification of the cause-effect pair.
      score_half: Evidence describes the stimulus/mechanism and the resulting state separately or implies the link, but lacks the explicit connection or specific terminology required to distinguish between options with different causes or effects.
      score_0: Evidence describes a generic event or state change without identifying the specific stimulus type, mechanism, or actor attribute, making it impossible to distinguish between options describing different causes or effects.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 171:good_vs_great:171:good:iter1->171:great:iter2
      - 296:weak_vs_good:296:weak:iter0->296:good:iter1
      - 322:weak_vs_good:322:weak:iter0->322:good:iter1
      - 517:weak_vs_good:517:weak:iter0->517:good:iter1
      weight: 4.0
    - name: explicit_enumeration_and_aggregation
      description: Evidence must provide a complete, non-truncated list of items, events, or attributes (e.g., bans, apparatuses, intro items) to verify inclusion or definitively exclude unlisted options, rather than relying on partial lists or inference.
      score_1: Evidence contains the full, untruncated list of items/events mentioned or shown, allowing definitive exclusion of any option not on the list or confirming the presence of all required elements.
      score_half: Evidence lists some items or events but is truncated, ambiguous, or missing a critical category, leaving uncertainty about whether unlisted options were mentioned or present.
      score_0: Evidence fails to capture the full segment, provides only a partial list, or relies on inference rather than explicit enumeration, making exclusion of unlisted options impossible.
      failure_repair_action: asr_match
      source_pair_examples:
      - 254:weak_vs_great:254:weak:iter0->254:great:final
      - 393:good_vs_great:393:good:iter1->393:great:iter2
      - 636:weak_vs_great:636:weak:iter0->636:great:final
      weight: 3.0
    - name: decisive_event_and_outcome_grounding
      description: Evidence must explicitly identify the specific action or visual mechanism that directly caused the final outcome (e.g., winning goal, game-ending destruction, specific ritual type), distinguishing it from general context or intermediate states.
      score_1: Evidence explicitly shows the decisive action (e.g., 'Nexus destruction', 'winning goal', 'specific ritual name') and links it to the final outcome, allowing exclusion of options claiming the win/outcome was achieved by a different mechanism.
      score_half: Evidence shows the final score, result, or general context but lacks the specific visual or textual confirmation of the decisive action or unique identifier, leaving ambiguity about the exact mechanism of the outcome.
      score_0: Evidence only shows the context of the competition or intermediate states without any reference to the specific event that secured the win or defined the outcome, making it impossible to distinguish between similar outcome options.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 395:weak_vs_good:395:weak:iter0->395:great:final
      - 475:weak_vs_great:475:weak:iter0->475:great:final
      - 526:good_vs_great:526:good:iter1->526:great:iter2
      - 556:good_vs_great:556:good:iter1->556:great:iter2
      weight: 5.0
    - name: actor_state_and_role_disambiguation
      description: Evidence must explicitly distinguish the physical state, posture, or specific reaction of the target actor, and identify the specific actor role (performer vs. spectator) to exclude options requiring conflicting states or attributing actions to the wrong group.
      score_1: Evidence explicitly states the actor's posture, state, or specific reaction (e.g., 'sitting', 'abnormal', 'performer') and distinguishes the actor role, allowing direct exclusion of conflicting options.
      score_half: Evidence implies the state through context or describes a generic reaction without the specific detail needed to distinguish between similar options or actor roles.
      score_0: Evidence describes actions or triggers without clarifying posture, state, or specific reaction, or fails to distinguish who is acting, leaving ambiguity between conflicting options.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 39:weak_vs_great:39:weak:iter0->39:great:final
      - 296:weak_vs_good:296:weak:iter0->296:good:iter1
      - 647:good_vs_great:647:good:iter1->647:great:iter2
      - 648:weak_vs_great:648:weak:iter0->648:great:final
      weight: 5.0
    - name: apparatus_and_context_disambiguation
      description: Evidence must explicitly distinguish between visually similar apparatuses, objects, or contexts using specific visual or textual markers to definitively exclude distractor options that rely on generic or similar descriptions.
      score_1: Evidence explicitly describes the specific apparatus, object variant, or setting (e.g., 'vertical poles', 'fire batons', 'stage with judges') in a way that is mutually exclusive with the distractor.
      score_half: Evidence describes the action or setting but uses ambiguous terms that could apply to both the video content and the distractor option.
      score_0: Evidence fails to describe the apparatus or setting, or describes it in a way that does not rule out the distractor, leaving the option unverifiable.
      failure_repair_action: refine_query
      source_pair_examples:
      - 636:weak_vs_great:636:weak:iter0->636:great:final
      - 639:weak_vs_good:639:weak:iter0->639:good:iter1
      - 648:weak_vs_great:648:weak:iter0->648:great:final
      - 654:weak_vs_good:654:weak:iter0->654:good:iter1
      weight: 4.0
    - name: temporal_sequence_and_completion_integrity
      description: Evidence must provide the full temporal sequence of the target action (initiation, execution, conclusion) and explicitly ground the chronological order relative to reference events to verify completion status or 'immediately after' constraints.
      score_1: Evidence describes the complete action sequence from start to finish and explicitly links the timing to reference events, allowing verification of completion and temporal constraints.
      score_half: Evidence describes the start or middle of the action but is truncated at the critical moment of completion, or implies the sequence without explicit temporal markers.
      score_0: Evidence is missing the action entirely, is severely truncated, or fails to establish the chronological order, making completion status and timing unverifiable.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 652:good_vs_great:652:good:iter1->652:great:iter2
      - 755:weak_vs_good:755:weak:iter0->755:good:iter1
      - 842:weak_vs_good:842:weak:iter0->842:good:iter1
      weight: 5.0
  attribute_perception:
    rubric_criteria:
    - name: explicit_attribute_definition_and_contrast
      description: Evidence must explicitly name the correct material, color, or state of the target entity and provide direct verbal or visual contrast to definitively exclude all alternative descriptive claims in the options, rather than merely negating one incorrect option without confirming the true value.
      score_1: Evidence explicitly states the correct attribute (e.g., 'made of lead', 'purple and white') and/or provides visual proof that excludes all incorrect options (e.g., 'not gold', 'not blue'), leaving no ambiguity.
      score_half: Evidence negates one incorrect option or describes the attribute generally but fails to explicitly confirm the actual value or exclude other plausible alternatives mentioned in the options.
      score_0: Evidence provides no specific information about the attribute's composition, definition, or relative magnitude, or only offers generic descriptions that could apply to multiple options.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 20:weak_vs_great:20:weak:iter0->20:great:final
      - 172:weak_vs_great:172:weak:iter0->172:great:final
      - 43:weak_vs_great:43:weak:iter0->43:great:final
      - 735:weak_vs_great:735:weak:iter0->735:great:final
      weight: 5.0
    - name: entity_grounding_and_spatial_relation
      description: Evidence must explicitly ground the relevant person, object, action, or spatial relation to the correct entity, ensuring the attribute is tied to the target and not conflated with similar distractors, background items, or other entities in the scene.
      score_1: Evidence explicitly identifies the specific entity and its spatial context (e.g., 'the red cup on the left table', 'the cougar fighting the bear') and links the attribute directly to it, excluding similar entities in the scene.
      score_half: Evidence identifies the general scene or object type but lacks specific spatial or identity markers to distinguish the target from similar distractors.
      score_0: Evidence provides only generic scene descriptions or fails to link the attribute to a specific, identifiable entity, leading to ambiguity.
      failure_repair_action: refine_query
      source_pair_examples:
      - 101:weak_vs_good:101:weak:iter0->101:good:iter1
      - 203:weak_vs_great:203:weak:iter0->203:great:final
      - 825:weak_vs_great:825:weak:iter0->825:great:final
      - 326:weak_vs_good:326:weak:iter0->326:good:iter1
      weight: 5.0
    - name: temporal_sequence_and_state_isolation
      description: Evidence must explicitly establish the chronological order of events and isolate the specific time window for the target attribute, distinguishing it from historical distractors, pre/post-event states, or future plans to verify or exclude options.
      score_1: Evidence explicitly anchors the target attribute to the correct time window (e.g., 'before burning', 'second attempt', 'current outfit') and excludes irrelevant historical interactions or other temporal states involving the same entities.
      score_half: Evidence mentions the correct time window or multiple events but lacks explicit ordering or clear temporal separation, risking false inference from distractors.
      score_0: Evidence fails to distinguish time windows or attempt order, mixing events from different eras or stages, leading to potential false attribution of the target attribute.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 2:good_vs_great:2:good:iter1->2:great:iter2
      - 55:weak_vs_good:55:weak:iter0->55:good:iter1
      - 735:weak_vs_great:735:weak:iter0->735:great:final
      weight: 4.0
    - name: causal_link_and_intent_explicitness
      description: Evidence must explicitly state the causal relationship, mechanism, or authorial intent connecting a specific state/action to an outcome or attribute, rather than merely listing facts in proximity or relying on implicit inference to verify causal or intent-based options.
      score_1: Evidence explicitly states the causal link (e.g., 'punished for divisions', 'slow tempo violates Beethoven's intent') or mechanism connecting the observed process to the target attribute change.
      score_half: Evidence mentions the state/action and the outcome in close proximity but lacks an explicit connecting verb, phrase, or logical bridge establishing causality or intent.
      score_0: Evidence mentions the state, action, or outcome in isolation without establishing the required causal or intentional relationship.
      failure_repair_action: asr_match
      source_pair_examples:
      - 25:weak_vs_great:25:weak:iter0->25:great:final
      - 41:weak_vs_great:41:weak:iter0->41:great:final
      - 169:weak_vs_good:169:weak:iter0->169:good:iter1
      weight: 2.0
  counting_problem:
    rubric_criteria:
    - name: exhaustive_distinct_entity_enumeration
      description: Evidence must explicitly identify, visually describe, or name every distinct instance of the target entity across the entire video timeline, distinguishing them from look-alikes, non-targets, or the same entity appearing in multiple segments.
      score_1: Evidence explicitly lists or describes every distinct target entity with unique identifiers (visual, textual, or functional) and confirms the absence of others, allowing a definitive total count.
      score_half: Evidence identifies most target entities but misses at least one distinct instance, fails to distinguish a target from a non-target, or treats a single entity appearing in multiple segments as multiple distinct counts.
      score_0: Evidence relies on generic descriptions (e.g., "people," "items"), lists only a subset of instances, or fails to distinguish between distinct entities, making the total count ambiguous.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 17:weak_vs_good:17:weak:iter0->17:great:final
      - 54:weak_vs_good:54:weak:iter0->54:great:final
      - 160:weak_vs_good:160:weak:iter0->160:good:iter1
      - 269:weak_vs_good:269:weak:iter0->269:great:final
      - 337:weak_vs_good:337:weak:iter0->337:great:final
      - 480:good_vs_great:480:good:iter1->480:great:iter2
      weight: 5.0
    - name: constraint_filtering_and_scope_grounding
      description: Evidence must explicitly link each identified entity to the specific constraints in the question (e.g., topic, time window, session type, record type, outcome status) to filter out instances that do not match the query criteria.
      score_1: Evidence explicitly maps every visual instance to the query's constraints (e.g., "Speaker X discusses Topic Y," "Event Z is a World Record"), allowing precise filtering.
      score_half: Evidence identifies the entities and mentions the constraints separately but fails to explicitly link them for every instance, leaving ambiguity about whether specific instances satisfy the query conditions.
      score_0: Evidence lists entities or constraints in isolation without mapping them, making it impossible to determine which instances count towards the final answer.
      failure_repair_action: refine_query
      source_pair_examples:
      - 91:weak_vs_good:91:weak:iter0->91:good:iter1
      - 487:weak_vs_good:487:weak:iter0->487:great:final
      - 427:weak_vs_good:427:weak:iter0->427:good:iter1
      - 612:weak_vs_good:612:weak:iter0->612:good:iter1
      weight: 5.0
    - name: segment_boundary_and_completion_verification
      description: Evidence must explicitly mark the start and end of countable units (e.g., completed edits, distinct tricks, finished games) to distinguish between continuous actions, fragmented views of the same unit, and multiple distinct units.
      score_1: Evidence explicitly identifies completion markers (e.g., "Apply," "finished," "next image") and transition points, clearly separating distinct countable units and reconciling fragmented views of the same unit.
      score_half: Evidence shows the actions but lacks explicit completion or transition markers, creating ambiguity about whether a unit is finished or if multiple segments represent the same unit.
      score_0: Evidence treats continuous sequences as distinct units or fails to identify boundaries, leading to overcounting or undercounting due to unclear segmentation.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 236:weak_vs_good:236:weak:iter0->236:great:final
      - 588:weak_vs_good:588:weak:iter0->588:good:iter1
      - 435:weak_vs_good:435:weak:iter0->435:good:iter1
      weight: 5.0
    - name: temporal_exhaustiveness
      description: Evidence must cover the entire relevant time window or provide a definitive summary confirming the total count, ensuring no instances are missed in unshown segments or gaps between sampled clips.
      score_1: Evidence covers the full duration, explicitly confirms zero occurrences in gaps, or provides a definitive summary statement confirming the total count is final.
      score_half: Evidence covers most of the duration but leaves significant gaps where the target entity could appear, or lists instances without confirming the list is exhaustive.
      score_0: Evidence provides only isolated snapshots or a partial sequence with no indication of whether more instances exist in the unshown timeline.
      failure_repair_action: time_sorted
      source_pair_examples:
      - 243:weak_vs_good:243:weak:iter0->243:great:final
      - 896:good_vs_great:896:good:iter1->896:great:iter2
      weight: 5.0
    - name: attribute_extraction_for_counting
      description: Evidence must explicitly extract the specific quantitative attribute (e.g., duration, height, score) for EVERY candidate entity mentioned to verify if it meets the counting condition, rather than just identifying the entity or providing the attribute for only a subset.
      score_1: Evidence explicitly states the target attribute for all candidate entities, allowing a definitive count of those meeting the condition.
      score_half: Evidence states the target attribute for some but not all candidate entities, leaving the total count ambiguous as the status of missing entities is unknown.
      score_0: Evidence identifies the entities but fails to provide the specific quantitative attribute for any or most of them, making the count impossible to determine.
      failure_repair_action: dense_sample
      source_pair_examples:
      - 794:weak_vs_good:794:weak:iter0->794:great:final
      - 260:weak_vs_great:260:weak:iter0->260:great:final
      weight: 4.0
    - name: distinct_kind_vs_instance_disambiguation
      description: Evidence must explicitly distinguish between unique design 'kinds' and multiple instances of the same design, or clarify if combined labels represent single or multiple units, to accurately count the specific category requested.
      score_1: Evidence explicitly identifies each segment as a unique 'kind' or confirms the counting unit (e.g., combined technique = 1), allowing precise verification of the count.

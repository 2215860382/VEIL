      score_half: Evidence identifies generic features (e.g., 'stone stairs', 'European square') or partial landmarks that suggest a region but do not uniquely identify the specific city/country.
      score_0: Evidence only describes generic settings (e.g., 'outdoor', 'stairs', 'plaza') without any unique identifying features.
